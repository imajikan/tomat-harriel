<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Lempar Tomat ke Harriel</title>

  <!-- GOOGLE FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Coiny&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1 class="page-title">
    🍅 Lempar Tomat ke Harriel 🍅
  </h1>

  <div class="counter-box">
    <div>Total Lemparan: <span id="totalCount">0</span></div>
    <div>Lemparan Hari Ini: <span id="dailyCount">0</span></div>
  </div>

  <button class="image-button" id="targetBtn">
    <img src="harriel.png" alt="Target">
  </button>

  <div class="other-game-box">
    <p>Main game lain? 🎮</p>
    <a
        href="https://imajikan.github.io/snackdropiel/"
        target="_blank"
        class="other-game-btn"
    >
        Feed Harriel
    </a>
</div>
  
  <audio id="splatSound" preload="auto">
    <source src="https://assets.mixkit.co/active_storage/sfx/2889/2889-preview.mp3" type="audio/mpeg">
  </audio>

  <script src="script.js"></script>
  
</body>
</html>
